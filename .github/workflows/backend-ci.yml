name: Backend CI

on:
  push:
    paths:
      - "Api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "Api/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore GMS.sln

      - name: Build solution
        run: dotnet build GMS.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test GMS.Application.Tests/GMS.Application.Tests.csproj --configuration Release --no-build --verbosity normal
